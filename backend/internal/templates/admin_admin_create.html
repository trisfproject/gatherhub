<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Admin Baru — GatherHub Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d1f;color:#fff;min-height:100vh}
    .sidebar{width:260px;background:#080818;border-right:1px solid rgba(255,255,255,.07);min-height:100vh;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow-y:auto}
    .main-content{margin-left:260px;min-height:100vh}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;font-size:.875rem;font-weight:600;color:rgba(255,255,255,.5);transition:all .2s;text-decoration:none}
    .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
    .nav-item.active{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.2)}
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px}
    .topbar{height:64px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(13,13,31,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:30;padding:0 24px;display:flex;align-items:center;justify-content:space-between}

    /* Form Inputs */
    .form-input{width:100%;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 16px;color:#fff;font-size:.875rem;transition:all .2s}
    .form-input:focus{outline:none;border-color:#6366f1;background:rgba(255,255,255,.06);box-shadow:0 0 0 4px rgba(99,102,241,.15)}
    .form-label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.45);margin-bottom:8px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease both}
  </style>
</head>
<body>
<div class="flex">

<!-- ─── SIDEBAR ─── -->
{{template "admin_sidebar" .}}

<!-- ─── MAIN CONTENT ─── -->
<div class="main-content flex-1 flex flex-col">
  <div class="topbar">
    <div>
      <h2 class="text-base font-bold text-white">Tambah Admin Baru</h2>
      <p class="text-xs text-white/30">Daftarkan akun administrator baru ke dalam sistem</p>
    </div>
    <div>
      <a href="/admin/admins"
         class="flex items-center gap-2 bg-white/5 hover:bg-white/10 text-white border border-white/10 font-bold py-2 px-4 rounded-xl text-sm transition-colors">
        Batal
      </a>
    </div>
  </div>

  <div class="p-6 max-w-2xl">
    {{if .Errors}}
    <div class="mb-6 bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-sm font-semibold">
      <p class="font-bold mb-2">Mohon perbaiki kesalahan berikut:</p>
      <ul class="list-disc pl-5 space-y-1">
        {{range .Errors}}
        <li>{{.}}</li>
        {{end}}
      </ul>
    </div>
    {{end}}

    <div class="glass p-6 fade-up">
      <form action="/admin/admins/create" method="POST" class="space-y-6">
        <div>
          <label for="name" class="form-label">Nama Lengkap</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Masukkan nama lengkap" value="{{.Form.name}}" required/>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Masukkan username" value="{{.Form.username}}" required/>
          </div>
          <div>
            <label for="email" class="form-label">Alamat Email</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="contoh@gatherhub.local" value="{{.Form.email}}" required/>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Min. 6 karakter" required/>
          </div>
          <div>
            <label for="role" class="form-label">Peran (Role)</label>
            <select id="role" name="role" class="form-input" required>
              <option value="ADMIN" {{if eq .Form.role "ADMIN"}}selected{{end}}>ADMIN (Akses Terbatas)</option>
              <option value="SUPER_ADMIN" {{if eq .Form.role "SUPER_ADMIN"}}selected{{end}}>SUPER_ADMIN (Akses Penuh)</option>
            </select>
          </div>
        </div>

        <div class="pt-4 border-t border-white/7 flex justify-end">
          <button type="submit"
                  class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-6 rounded-xl text-sm transition-colors">
            Simpan Admin
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

</div>
</body>
</html>
