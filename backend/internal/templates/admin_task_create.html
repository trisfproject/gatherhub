<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Tugas Persiapan Baru — GatherHub Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d1f;color:#fff;min-height:100vh}
    .sidebar{width:260px;background:#080818;border-right:1px solid rgba(255,255,255,.07);min-height:100vh;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:40;overflow-y:auto}
    .main-content{margin-left:260px;min-height:100vh}
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px}
    .topbar{height:64px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(13,13,31,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:30;padding:0 24px;display:flex;align-items:center;justify-content:space-between}

    /* Form Styles */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
    .form-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.6)}
    .form-input{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 16px;font-size:.875rem;color:#fff;outline:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
    .form-input:focus{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.08)}
    .form-input::placeholder{color:rgba(255,255,255,.25)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease both}
  </style>
</head>
<body>
<div class="flex">

<!-- ─── SIDEBAR ─── -->
{{template "admin_sidebar" .}}

<!-- ─── MAIN CONTENT ─── -->
<div class="main-content flex-1">
  <div class="topbar">
    <div class="flex items-center gap-3">
      <a href="/admin/tasks" class="text-white/40 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h2 class="text-base font-bold text-white">Tambah Tugas Baru</h2>
        <p class="text-xs text-white/30">Daftarkan rencana pekerjaan persiapan untuk kelancaran acara</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/30 rounded-xl px-3 py-1.5">
        <span class="text-xs text-indigo-300 font-bold">{{.AdminRole}}</span>
      </div>
    </div>
  </div>

  <div class="p-6 max-w-2xl">
    <!-- Errors Alert -->
    {{if .Errors}}
    <div class="bg-red-500/15 border border-red-500/30 text-red-300 rounded-xl p-4 mb-6 flex gap-3 fade-up">
      <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      <div>
        <div class="font-bold text-sm mb-1">Periksa kembali data formulir Anda:</div>
        <ul class="list-disc list-inside text-xs space-y-1 text-red-200">
          {{range .Errors}}
          <li>{{.}}</li>
          {{end}}
        </ul>
      </div>
    </div>
    {{end}}

    <form method="POST" action="/admin/tasks/create" class="space-y-6 fade-up" id="form-create-task">
      <div class="glass p-6">
        <h3 class="text-indigo-300 font-bold text-sm uppercase tracking-wider mb-5 pb-2 border-b border-white/5">Detail Tugas Persiapan</h3>

        <div class="flex flex-col gap-4">
          <!-- Event Selection -->
          <div class="form-group">
            <label class="form-label">Pilih Acara *</label>
            <select name="event_id" class="form-input bg-indigo-950/40 text-white" required id="task_event_id">
              <option value="" class="bg-indigo-950 text-white/50">-- Pilih Acara --</option>
              {{range .Events}}
                <option value="{{.ID}}" class="bg-indigo-950 text-white" {{if eq (index $.Form "event_id") (printf "%d" .ID)}}selected{{end}}>{{.Title}}</option>
              {{end}}
            </select>
          </div>

          <!-- Title -->
          <div class="form-group">
            <label class="form-label">Judul Tugas *</label>
            <input type="text" name="title" value='{{index .Form "title"}}' placeholder="Contoh: Menyiapkan desain merchandise" class="form-input" required id="task_title"/>
          </div>

          <!-- Description -->
          <div class="form-group">
            <label class="form-label">Deskripsi Tugas</label>
            <textarea name="description" placeholder="Jelaskan rincian tugas ini..." class="form-input min-h-[100px] resize-y" id="task_description">{{index .Form "description"}}</textarea>
          </div>

          <!-- Category -->
          <div class="form-group">
            <label class="form-label">Kategori *</label>
            <select name="category" class="form-input bg-indigo-950/40 text-white" required id="task_category">
              <option value="" class="bg-indigo-950 text-white/50">-- Pilih Kategori --</option>
              <option value="Registration" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Registration"}}selected{{end}}>Pendaftaran (Registration)</option>
              <option value="Transportation" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Transportation"}}selected{{end}}>Transportasi (Transportation)</option>
              <option value="Merchandise" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Merchandise"}}selected{{end}}>Merchandise</option>
              <option value="Sponsor" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Sponsor"}}selected{{end}}>Sponsor / Partner</option>
              <option value="Venue" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Venue"}}selected{{end}}>Lokasi / Venue</option>
              <option value="Broadcast" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Broadcast"}}selected{{end}}>Siaran / Broadcast</option>
              <option value="Logistics" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Logistics"}}selected{{end}}>Logistik</option>
              <option value="Other" class="bg-indigo-950 text-white" {{if eq (index .Form "category") "Other"}}selected{{end}}>Lainnya (Other)</option>
            </select>
          </div>

          <!-- Priority & Status -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">Prioritas *</label>
              <select name="priority" class="form-input bg-indigo-950/40 text-white" required id="task_priority">
                <option value="Low" class="bg-indigo-950 text-white" {{if eq (index .Form "priority") "Low"}}selected{{end}}>Low (Rendah)</option>
                <option value="Medium" class="bg-indigo-950 text-white" {{if eq (index .Form "priority") "Medium"}}selected{{end}}>Medium (Sedang)</option>
                <option value="High" class="bg-indigo-950 text-white" {{if eq (index .Form "priority") "High"}}selected{{end}}>High (Tinggi)</option>
                <option value="Critical" class="bg-indigo-950 text-white" {{if eq (index .Form "priority") "Critical"}}selected{{end}}>Critical (Kritis)</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Status *</label>
              <select name="status" class="form-input bg-indigo-950/40 text-white" required id="task_status">
                <option value="Todo" class="bg-indigo-950 text-white" {{if eq (index .Form "status") "Todo"}}selected{{end}}>Todo</option>
                <option value="In Progress" class="bg-indigo-950 text-white" {{if eq (index .Form "status") "In Progress"}}selected{{end}}>In Progress</option>
                <option value="Done" class="bg-indigo-950 text-white" {{if eq (index .Form "status") "Done"}}selected{{end}}>Done</option>
                <option value="Cancelled" class="bg-indigo-950 text-white" {{if eq (index .Form "status") "Cancelled"}}selected{{end}}>Cancelled</option>
              </select>
            </div>
          </div>

          <!-- Due Date & Assigned To -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group">
              <label class="form-label">Jatuh Tempo (Due Date) *</label>
              <input type="date" name="due_date" value='{{index .Form "due_date"}}' class="form-input" required id="task_due_date"/>
            </div>

            <div class="form-group">
              <label class="form-label">Ditugaskan Kepada (Assigned To)</label>
              <input type="text" name="assigned_to" value='{{index .Form "assigned_to"}}' placeholder="Nama penanggung jawab" class="form-input" id="task_assigned_to"/>
            </div>
          </div>

        </div>
      </div>

      <!-- Submit Section -->
      <div class="flex items-center justify-end gap-3 pt-3">
        <a href="/admin/tasks?event_id={{index .Form "event_id"}}"
           class="bg-white/6 hover:bg-white/10 border border-white/10 font-bold py-2.5 px-6 rounded-xl text-sm transition-colors text-white">
          Batal
        </a>
        <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-500 font-bold py-2.5 px-8 rounded-xl text-sm transition-colors text-white"
                id="btn-save-task">
          Simpan Tugas
        </button>
      </div>
    </form>
  </div>
</div>

</div>
</body>
</html>
