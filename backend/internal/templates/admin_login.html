<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — GatherHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#07071a;color:#fff;min-height:100vh}
    .bg-mesh{background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.1) 0%,transparent 50%),#07071a}
    .glass{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1)}
    .form-input{
      width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
      color:#fff;border-radius:12px;padding:13px 16px;font-size:.9rem;
      font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;outline:none;
    }
    .form-input::placeholder{color:rgba(255,255,255,.25)}
    .form-input:focus{border-color:rgba(99,102,241,.7);background:rgba(99,102,241,.08);box-shadow:0 0 0 3px rgba(99,102,241,.18)}
    .btn-login{background:linear-gradient(135deg,#6366f1,#8b5cf6);transition:all .25s;box-shadow:0 6px 24px rgba(99,102,241,.4)}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(99,102,241,.55)}
    .btn-login:active{transform:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:fadeUp .5s ease both}
  </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm anim">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 shadow-xl shadow-indigo-500/30">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-white">Admin Panel</h1>
      <p class="text-white/40 text-sm mt-1">GatherHub — Manajemen Pendaftaran</p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-3xl p-8">
      {{if .Error}}
      <div class="flex items-center gap-3 bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 mb-6">
        <svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-red-300 text-sm font-semibold">{{.Error}}</p>
      </div>
      {{end}}

      <form method="POST" action="/admin/login">
        <div class="space-y-5">
          <div>
            <label for="username" class="block text-xs font-700 text-white/60 uppercase tracking-wider mb-2 font-bold">Username</label>
            <div class="relative">
              <div class="absolute left-4 top-1/2 -translate-y-1/2">
                <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <input type="text" id="username" name="username"
                     placeholder="Masukkan username admin"
                     autocomplete="username" required
                     class="form-input pl-11"/>
            </div>
          </div>

          <div>
            <label for="password" class="block text-xs font-700 text-white/60 uppercase tracking-wider mb-2 font-bold">Password</label>
            <div class="relative">
              <div class="absolute left-4 top-1/2 -translate-y-1/2">
                <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </div>
              <input type="password" id="password" name="password"
                     placeholder="Masukkan password"
                     autocomplete="current-password" required
                     class="form-input pl-11"/>
            </div>
          </div>

          <button type="submit"
                  class="btn-login w-full flex items-center justify-center gap-2 font-bold py-3.5 rounded-2xl text-sm text-white mt-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            Masuk ke Panel Admin
          </button>
        </div>
      </form>
    </div>

    <div class="text-center mt-6">
      <a href="/" class="text-white/30 hover:text-white/60 text-xs transition-colors flex items-center justify-center gap-1">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Kembali ke halaman publik
      </a>
    </div>
  </div>

</body>
</html>
