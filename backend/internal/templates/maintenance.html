<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pemeliharaan Sistem — {{setting "site_name"}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #07071a; color: #fff; }
    .bg-hero { background: linear-gradient(135deg, #0d0d2b 0%, #1a1040 40%, #0d1635 100%); }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body class="bg-hero min-h-screen flex items-center justify-center p-4">
  <div class="glass max-w-md w-full rounded-3xl p-8 text-center relative overflow-hidden shadow-2xl">
    <!-- Glow element -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-20 h-20 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-400">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </div>

    <h1 class="text-2xl font-extrabold mb-3 text-white">Pemeliharaan Sistem</h1>
    <p class="text-white/60 text-sm mb-6 leading-relaxed">
      Situs sedang dalam pemeliharaan berkala untuk meningkatkan layanan kami. Kami akan segera kembali!
    </p>

    <!-- Support / Contact Info -->
    <div class="bg-black/30 border border-white/5 rounded-2xl p-4 text-left text-xs space-y-3.5 mb-2">
      <p class="font-bold text-white/50 uppercase tracking-wider text-[10px]">Hubungi Kami</p>
      <div class="flex items-center gap-3">
        <div class="text-indigo-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <div>
          <span class="text-white/40 block">WhatsApp</span>
          <a href="https://wa.me/{{setting "support_whatsapp"}}" target="_blank" class="font-semibold text-white hover:text-indigo-300 transition-colors">{{setting "support_name"}}</a>
        </div>
      </div>
      <div class="flex items-center gap-3 pt-3 border-t border-white/5">
        <div class="text-indigo-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div>
          <span class="text-white/40 block">Email Support</span>
          <a href="mailto:{{setting "support_email"}}" class="font-semibold text-white hover:text-indigo-300 transition-colors">{{setting "support_email"}}</a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-[10px] text-white/30 mt-6">{{setting "footer_text"}}</p>
  </div>
</body>
</html>
