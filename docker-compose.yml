services:
  # PostgreSQL 17
  postgres:
    image: postgres:17-alpine
    container_name: gatherhub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gatherhub
      POSTGRES_USER: gatherhub
      POSTGRES_PASSWORD: gatherhub
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatherhub -d gatherhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Go + Fiber)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - APP_VERSION=1.0.0
        - BUILD_DATE
        - GIT_COMMIT
    container_name: gatherhub_backend
    restart: unless-stopped
    environment:
      APP_PORT: 3000
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gatherhub
      DB_PASSWORD: gatherhub
      DB_NAME: gatherhub
      DB_SSLMODE: disable
      # Storage lives outside the repo, mounted as a volume at /storage.
      # Sub-directories (payments/, events/, temp/) are created automatically.
      STORAGE_PATH: /storage
      FRONTEND_DIR: /app/frontend
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SESSION_SECRET: gatherhub-secret-change-in-production
    ports:
      - "3000:3000"
    volumes:
      # Runtime storage — mounted volume inside repo, ignored by git.
      - ./runtime-storage:/storage
      - ./frontend:/app/frontend:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gatherhub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      # Serve uploaded files directly from storage (no round-trip through backend)
      - ./runtime-storage/payments:/var/www/payments:ro
      - ./runtime-storage/events:/var/www/events:ro
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: gatherhub_network
